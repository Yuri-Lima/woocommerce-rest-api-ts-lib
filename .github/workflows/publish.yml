# This workflow will do a clean installation of node dependencies using pnpm, cache/restore them, build the source code and run release across different versions of node.
# pnpm-exclusive: no npm/yarn used in CI.
name: Publish NPM CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    # Note: semantic-release only executes on exact main ref (see step condition); PRs only validate.
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - name: Install dependencies (frozen)
        run: pnpm install --frozen-lockfile
      - name: Build (verify)
        run: pnpm run build
      - name: Typecheck
        run: pnpm run typecheck
      - name: Lint
        run: pnpm run lint
      - name: Test
        run: pnpm test
      - name: Release (main branch only)
        if: github.ref == 'refs/heads/main'
        run: pnpm run semantic-release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
