# Validate monorepo build/test on PRs; semantic-release only on main.
# pnpm-exclusive: pin must match package.json "packageManager".
# pnpm@11.5 requires Node >= 22.13 (node:sqlite) — matrix is 22.x only.
name: Publish NPM CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    # Note: semantic-release only executes on exact main ref (see step condition); PRs only validate.
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    strategy:
      matrix:
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          run_install: false
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - name: Install dependencies (frozen)
        run: pnpm install --frozen-lockfile
      - name: Build (library + store-api + mcp-server)
        run: pnpm run build
      - name: Typecheck
        run: pnpm run typecheck
      - name: Lint
        run: pnpm run lint
      - name: Test
        run: pnpm test
      # Triple-package release on main:
      # 1) semantic-release bumps/publishes the root library from conventional commits
      # 2) publish-packages publishes any versions not yet on npm:
      #    woocommerce-rest-ts-api + woo-store-ts-api + woo-mcp-server
      - name: Release library (semantic-release, main only)
        if: github.ref == 'refs/heads/main'
        run: pnpm run semantic-release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish monorepo packages (library + store + MCP if not already on npm)
        if: github.ref == 'refs/heads/main'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # quality gates already ran above
          SKIP_BUILD: "1"
          SKIP_TESTS: "1"
        run: |
          chmod +x scripts/publish-packages.sh
          bash scripts/publish-packages.sh
