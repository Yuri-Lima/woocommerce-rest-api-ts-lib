# pnpm-exclusive CI for build/test on main and updates branches.
# Modern Node matrix (>=18 per engines). No npm/yarn.
name: Updates Test CI
on:
  push:
    branches: [ "updates", "main", "master" ]
  pull_request:
    branches: [ "updates", "main", "master" ]
  workflow_dispatch:
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          # Match package.json packageManager field exactly (avoid dual version error)
          version: 11.5.0
          run_install: false
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - name: Install dependencies (frozen)
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm run typecheck
      - name: Build
        run: pnpm run build
      - name: Test
        run: pnpm test
