# pnpm-exclusive CI for dependency update validation and build/test on the 'updates' branch.
# Modern Node matrix (>=18 per engines). No npm/yarn.
name: Updates Test CI
on:
  push:
    branches: [ "updates", "main", "master" ]
  pull_request:
    branches: [ "updates", "main", "master" ]
  workflow_dispatch:
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - name: Install dependencies (frozen)
        run: pnpm install --frozen-lockfile
      - name: Update deps (non-destructive check + doctor)
        run: pnpm run dep:update || true # best-effort; ncu may suggest changes but we validate build/test after
      - name: Typecheck
        run: pnpm run typecheck
      - name: Build
        run: pnpm run build
      - name: Test
        run: pnpm test
