# pnpm-exclusive CI for build/test on main and updates branches.
# pnpm@11.5 requires Node >= 22.13 (node:sqlite).
# Build before typecheck so workspace package types (dist/) resolve for woo-mcp-server.
name: Updates Test CI
on:
  push:
    branches: [ "updates", "main", "master" ]
  pull_request:
    branches: [ "updates", "main", "master" ]
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
          run_install: false
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - name: Install dependencies (frozen)
        run: pnpm install --frozen-lockfile
      - name: Build (library + mcp-server)
        run: pnpm run build
      - name: Typecheck
        run: pnpm run typecheck
      - name: Test
        run: pnpm test
